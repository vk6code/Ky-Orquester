# Orquester - Nginx Configuration
#
# Ubicación: /etc/nginx/sites-available/orquester
#
# Uso:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/orquester
#   sudo ln -s /etc/nginx/sites-available/orquester /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d orquester.tudominio.com

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name orquester.tudominio.com;

    # Certbot needs to access this for validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name orquester.tudominio.com;

    # SSL certificates (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/orquester.tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/orquester.tudominio.com/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Client limits
    client_max_body_size 100M;
    client_body_timeout 86400s;
    client_header_timeout 86400s;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy to Orquester daemon
    location / {
        proxy_pass http://127.0.0.1:57831;
        proxy_http_version 1.1;

        # WebSocket support (for events streaming)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running PTY sessions
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
